name: Benchmarks

# Runs the CI-safe optimiser benchmarks (those that do NOT need OpenCOR — currently both the
# FitzHugh-Nagumo and the stiff 3compartment comparisons, which run on Myokit/CasADi),
# refreshes the results table in the parameter-identification docs, and (on the default branch)
# opens a PR with the refreshed table. Merging that PR triggers the Docs Release workflow
# (release-docs.yml), which republishes the tutorial from source so the numbers persist.
# The 3compartment run is slow (~20+ min); this workflow is scheduled weekly / on dispatch.
#
# Why a PR and not a direct push+deploy: `master` is branch-protected, so a runner `git push`
# is rejected (GH006), and a one-off `mkdocs gh-deploy` from the runner is overwritten the next
# time release-docs deploys from the (unchanged) source. Publishing through source via a PR is
# the only path that survives both. See the "Open/update the benchmark-results PR" step.

on:
  workflow_dispatch:
  # Push a tag like `run-benchmarks-<anything>` to run the benchmarks on that commit on demand
  # (works from any branch, unlike workflow_dispatch which needs the workflow on the default
  # branch). Handy for benchmarking a feature branch and emailing the results.
  push:
    tags:
      - 'run-benchmarks-*'
  schedule:
    - cron: '0 4 * * 1'   # weekly, Monday 04:00 UTC

permissions:
  contents: write
  pull-requests: write   # results are published by opening a PR (master is branch-protected)

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system libraries (MPI, SUNDIALS)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin libsundials-dev build-essential

      - name: Install package and docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "mkdocs-material>=9.0" "mkdocstrings[python]>=0.24"

      - name: Run CI-safe benchmarks (no OpenCOR), update docs, capture results
        id: bench
        continue-on-error: true   # still email/summarise results even if an assertion fails
        run: |
          set -o pipefail
          python benchmarks/run_benchmarks.py --set ci --update-docs --assert \
            --results-out benchmark_results.md 2>&1 | tee benchmark_output.txt

      - name: Publish results to the run summary
        if: always()
        run: |
          {
            echo "## Optimiser benchmark results"
            echo "Branch \`${{ github.ref_name }}\` @ \`${{ github.sha }}\` — outcome: **${{ steps.bench.outcome }}**"
            echo
            if [ -f benchmark_results.md ]; then
              cat benchmark_results.md
            else
              echo "Results table not produced; tail of the log:"
              echo '```'; tail -n 80 benchmark_output.txt 2>/dev/null; echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results and log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.md
            benchmark_output.txt
          if-no-files-found: warn

      # Detect whether the SMTP secrets are configured (secrets can't be used directly in a step
      # `if:`, so map to an env var and expose the result as an output).
      - name: Detect mail configuration
        id: mailcfg
        if: always()
        env:
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
        run: |
          if [ -n "$MAIL_SERVER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "MAIL_SERVER secret not set; skipping email (results are in the summary/artifact)."
          fi

      # Emails the results when the SMTP secrets are configured (MAIL_SERVER, MAIL_PORT,
      # MAIL_USERNAME, MAIL_PASSWORD; optional BENCHMARK_EMAIL_TO overrides the recipient).
      # Skips cleanly if MAIL_SERVER is unset, and never fails the job.
      - name: Email the benchmark results
        if: always() && steps.mailcfg.outputs.configured == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Benchmarks ${{ steps.bench.outcome }} — ${{ github.ref_name }}"
          to: ${{ secrets.BENCHMARK_EMAIL_TO || 'finbar.argus@auckland.ac.nz' }}
          from: Circulatory Autogen CI <${{ secrets.MAIL_USERNAME }}>
          body: |
            Optimiser benchmarks for ${{ github.ref_name }} @ ${{ github.sha }}
            finished with outcome: ${{ steps.bench.outcome }}.

            Full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The results table (benchmark_results.md) and full log (benchmark_output.txt)
            are attached.
          attachments: benchmark_results.md,benchmark_output.txt

      # Publish the refreshed results by opening (or rolling forward) a PR against the default
      # branch. This is gated on the *ref*, not the trigger, so it runs for both the weekly
      # schedule and a manual workflow_dispatch on master -- but NOT for a `run-benchmarks-*`
      # tag on a feature branch (github.ref is then refs/tags/..., so this is skipped and a
      # feature-branch benchmark just emails/summarises without touching the docs).
      #
      # A PR is used rather than a direct push because master is branch-protected (a runner push
      # is rejected with GH006). Merging the PR lands the results in source; release-docs.yml
      # then rebuilds and deploys the tutorial, so the table persists instead of being wiped by
      # the next docs deploy. The results are published regardless of the --assert outcome -- a
      # cost/timing regression is a real, publishable number; the assertion failure is surfaced
      # separately in the "Reflect benchmark failure" step and the run summary/email.
      #
      # peter-evans/create-pull-request maintains a single rolling branch/PR, so repeated runs
      # update the same PR instead of opening a new one each time. For fully hands-off publishing
      # (no manual merge), set a bypass token (a PAT or GitHub App token allowed past branch
      # protection) as `token:` here and switch its base to a direct commit; the default
      # GITHUB_TOKEN cannot bypass protection.
      - name: Open/update the benchmark-results PR
        if: >-
          always()
          && github.ref == 'refs/heads/master'
          && hashFiles('benchmark_results.md') != ''
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: tutorial/docs/parameter-identification.md
          branch: benchmarks/refresh-results
          base: master
          commit-message: "chore(benchmarks): refresh published benchmark results"
          title: "chore(benchmarks): refresh published benchmark results"
          body: |
            Automated refresh of the benchmark results table in
            `tutorial/docs/parameter-identification.md`.

            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Trigger: `${{ github.event_name }}` — benchmark outcome: **${{ steps.bench.outcome }}**

            Merging republishes the tutorial via the **Docs Release** workflow (release-docs.yml).
            (A `failure` outcome means a regression *assertion* tripped; the numbers are still
            valid — see the run summary/log for which one.)
          delete-branch: true

      - name: Reflect benchmark failure in the job status
        if: steps.bench.outcome == 'failure'
        run: |
          echo "Benchmarks failed (see the log/artifact/email above)."
          exit 1
